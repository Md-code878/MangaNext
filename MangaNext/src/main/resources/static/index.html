<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaNext - Kotatsu UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #E1E1E1; }
        .manga-card { aspect-ratio: 2/3; position: relative; overflow: hidden; border-radius: 12px; }
        .manga-overlay { background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); }
        .nav-active { color: #BB86FC; }
    </style>
</head>
<body class="pb-20">

    <header class="p-4 flex justify-between items-center sticky top-0 bg-black z-10">
        <h1 class="text-2xl font-bold text-purple-400">MangaNext</h1>
        <button class="p-2 bg-gray-900 rounded-full">🔍</button>
    </header>

    <main class="p-4 grid grid-cols-3 gap-3" id="manga-grid">
        <div class="manga-card bg-gray-800">
            <div class="manga-overlay absolute inset-0 flex items-end p-2">
                <p class="text-xs font-semibold truncate">Solo Leveling</p>
            </div>
        </div>
        <div class="manga-card bg-gray-800">
            <div class="manga-overlay absolute inset-0 flex items-end p-2">
                <p class="text-xs font-semibold truncate">One Piece</p>
            </div>
        </div>
        <div class="manga-card bg-gray-800">
            <div class="manga-overlay absolute inset-0 flex items-end p-2">
                <p class="text-xs font-semibold truncate">Tower of God</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-[#121212] border-t border-gray-800 flex justify-around p-3 text-gray-500">
        <div class="flex flex-col items-center nav-active">
            <span class="text-xl">📚</span>
            <span class="text-[10px]">Library</span>
        </div>
        <div class="flex flex-col items-center">
            <span class="text-xl">🔄</span>
            <span class="text-[10px]">Updates</span>
        </div>
        <div class="flex flex-col items-center" onclick="window.location.href='/browse'">
            <span class="text-xl">🌍</span>
            <span class="text-[10px]">Browse</span>
        </div>
        <div class="flex flex-col items-center">
            <span class="text-xl">⚙️</span>
            <span class="text-[10px]">Settings</span>
        </div>
    </nav>

    <script>
        // Simple function to fetch search results from our Ktor API
        async function searchManga(query) {
            const response = await fetch('/search?q=' + query);
            const data = await response.json();
            console.log("Search Results:", data);
        }
    </script>
</body>
</html>
